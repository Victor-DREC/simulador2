<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <i class="fas fa-calculator-alt header-icon"></i>
            <h1>Simulador de Crédito</h1>
            <p class="subtitle">Analiza tu viabilidad financiera al instante</p>
        </header>

        <main>
            <section class="card">
                <h2><i class="fas fa-wallet"></i> Datos financieros</h2>
                <div class="input-group">
                    <label for="txtIngresos">Ingresos Mensuales</label>
                    <div class="input-wrapper">
                        <span class="currency">$</span>
                        <input type="number" id="txtIngresos" placeholder="0.00">
                    </div>
                </div>

                <div class="input-group">
                    <label for="txtEgresos">Egresos Mensuales</label>
                    <div class="input-wrapper">
                        <span class="currency">$</span>
                        <input type="number" id="txtEgresos" placeholder="0.00">
                    </div>
                </div>

                <div class="results-grid">
                    <div class="result-item">
                        <small>Disponible</small>
                        <span id="spnDisponible">$ 0.00</span>
                    </div>
                    <div class="result-item">
                        <small>Capacidad de Pago</small>
                        <span id="spnCapacidadPago">$ 0.00</span>
                    </div>
                </div>
            </section>

            <section class="card secondary">
                <h2><i class="fas fa-hand-holding-usd"></i> Solicitud de crédito</h2>
                
                <div class="input-grid">
                    <div class="input-group">
                        <label for="txtMonto">Monto</label>
                        <input type="number" id="txtMonto" placeholder="Ej: 5000">
                    </div>
                    <div class="input-group">
                        <label for="txtPlazo">Plazo (Años)</label>
                        <input type="number" id="txtPlazo" placeholder="Ej: 2">
                    </div>
                </div>

                <div class="input-group">
                    <label for="txtTasaInteres">Tasa de Interés Anual (%)</label>
                    <input type="number" id="txtTasaInteres" placeholder="Ej: 12">
                </div>

                <div class="final-results">
                    <div class="detail">
                        <span>Interés a pagar:</span>
                        <span id="spnInteresPagar" class="value">$ 0.00</span>
                    </div>
                    <div class="detail highlight">
                        <span>Total préstamo:</span>
                        <span id="spnTotalPrestamo" class="value">$ 0.00</span>
                    </div>
                    <div class="detail highlight">
                        <span>Cuota mensual:</span>
                        <span id="spnCuotaMensual" class="value">$ 0.00</span>
                    </div>
                </div>

                <div class="status-box">
                    <p>Estado de crédito:</p>
                    <span id="spnEstadoCredito">ESPERANDO DATOS</span>
                </div>
            </section>
        </main>

        <div class="buttons">
            <button id="btnCalcularCredito" class="btn-primary" onclick="calcular()">
                <i class="fas fa-check-circle"></i> Calcular Crédito
            </button>
            <button id="btnReiniciar" class="btn-outline" onclick="location.reload()">
                <i class="fas fa-redo"></i> Reiniciar
            </button>
        </div>
    </div>

</body>
</html>
