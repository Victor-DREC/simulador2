<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLAMTEC - Simulador de Crédito</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-container">
                <i class="fas fa-microchip header-icon"></i>
                <span class="brand-name">GLAMTEC</span>
            </div>
            <h1>Simulador de Crédito</h1>
            <p class="subtitle">Banca Digital Inteligente</p>
        </header>

        <main>
            <section class="card">
                <h2><i class="fas fa-wallet"></i> Perfil Financiero</h2>
                <div class="flex-row">
                    <div class="input-group">
                        <label for="txtIngresos">Ingresos</label>
                        <input type="number" id="txtIngresos" placeholder="$ 0.00">
                    </div>
                    <div class="input-group">
                        <label for="txtEgresos">Egresos</label>
                        <input type="number" id="txtEgresos" placeholder="$ 0.00">
                    </div>
                </div>

                <div class="results-grid">
                    <div class="result-box">
                        <small>Disponible</small>
                        <span id="spnDisponible">0.00</span>
                    </div>
                    <div class="result-box">
                        <small>Capacidad</small>
                        <span id="spnCapacidadPago">0.00</span>
                    </div>
                </div>
            </section>

            <section class="card secondary">
                <h2><i class="fas fa-hand-holding-usd"></i> Detalles del Crédito</h2>
                
                <div class="flex-row">
                    <div class="input-group full-mobile">
                        <label for="txtMonto">Monto</label>
                        <input type="number" id="txtMonto" placeholder="Ej: 5000">
                    </div>
                    <div class="flex-row-inner">
                        <div class="input-group">
                            <label for="txtPlazo">Plazo (Años)</label>
                            <input type="number" id="txtPlazo" placeholder="Ej: 2">
                        </div>
                        <div class="input-group">
                            <label for="txtTasaInteres">Tasa (%)</label>
                            <input type="number" id="txtTasaInteres" placeholder="12">
                        </div>
                    </div>
                </div>

                <div class="summary-list">
                    <div class="summary-item"><span>Interés total:</span> <span id="spnInteresPagar">$ 0.00</span></div>
                    <div class="summary-item bold"><span>Total préstamo:</span> <span id="spnTotalPrestamo">$ 0.00</span></div>
                    <div class="summary-item highlight"><span>Cuota mensual:</span> <span id="spnCuotaMensual">$ 0.00</span></div>
                </div>

                <div class="status-container">
                    <p>Resolución GLAMTEC:</p>
                    <span id="spnEstadoCredito">ESPERANDO DATOS</span>
                </div>
            </section>
        </main>

        <div class="actions">
            <button id="btnCalcularCredito" class="btn-main" onclick="calcular()">
                <i class="fas fa-bolt"></i> Calcular
            </button>
            <button id="btnReiniciar" class="btn-alt" onclick="location.reload()">
                <i class="fas fa-undo"></i>
            </button>
        </div>
    </div>

</body>
</html>
