<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLAMTEC - Finanzas Inteligentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
<body>

    <div class="app-shell">
        <header class="main-header">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fas fa-microchip"></i>
                </div>
                <div class="brand-text">
                    <span class="brand-name">GLAMTEC</span>
                    <span class="brand-tagline">Banca Digital Inteligente</span>
                </div>
            </div>
        </header>

        <main class="content-grid">
            <section class="glass-card">
                <div class="card-header">
                    <i class="fas fa-chart-line"></i>
                    <h3>Perfil Financiero</h3>
                </div>
                
                <div class="input-stack">
                    <div class="input-field">
                        <label for="txtIngresos">Ingresos Mensuales</label>
                        <div class="input-wrapper">
                            <span class="prefix">$</span>
                            <input type="number" id="txtIngresos" placeholder="0.00">
                        </div>
                    </div>
                    <div class="input-field">
                        <label for="txtEgresos">Egresos Mensuales</label>
                        <div class="input-wrapper">
                            <span class="prefix">$</span>
                            <input type="number" id="txtEgresos" placeholder="0.00">
                        </div>
                    </div>
                </div>

                <div class="mini-dashboard">
                    <div class="stat-box">
                        <span class="stat-label">Disponible</span>
                        <span class="stat-value" id="spnDisponible">0.00</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Capacidad de Pago</span>
                        <span class="stat-value" id="spnCapacidadPago">0.00</span>
                    </div>
                </div>
            </section>

            <section class="glass-card accent">
                <div class="card-header">
                    <i class="fas fa-hand-holding-dollar"></i>
                    <h3>Configuración de Crédito</h3>
                </div>

                <div class="input-field">
                    <label for="txtMonto">Monto del Préstamo</label>
                    <div class="input-wrapper main-amount">
                        <span class="prefix">$</span>
                        <input type="number" id="txtMonto" placeholder="Ej: 5000">
                    </div>
                </div>

                <div class="dual-inputs">
                    <div class="input-field">
                        <label for="txtPlazo">Plazo (Años)</label>
                        <input type="number" id="txtPlazo" placeholder="2">
                    </div>
                    <div class="input-field">
                        <label for="txtTasaInteres">Tasa Anual (%)</label>
                        <input type="number" id="txtTasaInteres" placeholder="12">
                    </div>
                </div>

                <div class="status-badge">
                    <span class="status-label">Estado de Resolución:</span>
                    <span id="spnEstadoCredito" class="status-value">ESPERANDO DATOS</span>
                </div>
            </section>

            <section class="results-card">
                <div class="main-result">
                    <span class="result-label">Cuota Mensual Estimada</span>
                    <span class="result-amount" id="spnCuotaMensual">$ 0.00</span>
                </div>
                
                <div class="breakdown">
                    <div class="breakdown-item">
                        <span>Intereses</span>
                        <span id="spnInteresPagar">$ 0.00</span>
                    </div>
                    <div class="breakdown-item total">
                        <span>Total a Pagar</span>
                        <span id="spnTotalPrestamo">$ 0.00</span>
                    </div>
                </div>
            </section>
        </main>

        <footer class="actions-bar">
            <button id="btnReiniciar" class="btn-secondary" onclick="location.reload()" title="Reiniciar">
                <i class="fas fa-arrow-rotate-left"></i>
            </button>
            <button id="btnCalcularCredito" class="btn-primary" onclick="calcular()">
                <span>Calcular Crédito</span>
                <i class="fas fa-bolt"></i>
            </button>
        </footer>
    </div>

</body>
</html>
